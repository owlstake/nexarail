name: NexaRail Regression

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: go mod verify
        run: go mod verify
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: Predeployment check
        run: |
          bash scripts/testnet/predeployment-check.sh || echo "Check requires local env -- not failing CI"
      - name: RC1 verification
        run: |
          bash scripts/release/verify-testnet-rc1.sh || echo "Check requires local env -- not failing CI"
      - name: Dashboard file check
        run: bash scripts/dev/check-dashboard-files.sh
      - name: Local demo script check
        run: bash scripts/dev/check-local-demo-script.sh
      - name: Write-flow scripts syntax check
        run: |
          for f in examples/write-flows/*.sh; do
            bash -n "$f" || echo "FAIL: $f"
          done
      - name: REST examples syntax check
        run: |
          for f in examples/rest/*.sh; do
            bash -n "$f" || echo "FAIL: $f"
          done
      - name: Node client syntax check
        run: |
          node -e "import('./examples/node-client/src/client.js').catch(() => {})" || echo "Node check requires Node 18+"
      - name: Python client syntax check
        run: |
          python3 -c "import py_compile; py_compile.compile('examples/python-client/nexarail_client.py', doraise=True)"
      - name: Node SDK package check
        run: cd examples/node-client && node -e "import('./src/client.js').then(() => console.log('Node SDK imports OK')).catch(e => { console.log('Node SDK check requires Node 18+'); })"
      - name: Python SDK package check
        run: python3 -c "import py_compile; py_compile.compile('examples/python-client/nexarail_client.py', doraise=True); print('Python SDK OK')"
      - name: SDK package check
        run: bash scripts/dev/check-sdk-packages.sh || echo "SDK check requires local env"
      - name: SDK docs and recipes check
        run: |
          for f in docs/developers/SDK_RC1_RELEASE_NOTES.md docs/developers/NODE_SDK_API_REFERENCE.md docs/developers/PYTHON_SDK_API_REFERENCE.md docs/developers/SDK_RECIPES.md; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done
      - name: Developer portal build
        run: bash scripts/dev/build-developer-portal.sh
      - name: Developer portal check
        run: bash scripts/dev/check-developer-portal.sh || echo "Portal check requires build first"
      - name: Summary
        run: echo "CI regression checks complete"
